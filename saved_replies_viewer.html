<style>
  :root {
    --bg: #0f1117;
    --card: #1a1d27;
    --border: #2a2d3a;
    --text: #e4e4e7;
    --muted: #8b8d98;
    --accent: #6366f1;
    --accent2: #818cf8;
    --green: #34d399;
    --amber: #fbbf24;
    --rose: #fb7185;
    --cyan: #22d3ee;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif; background: var(--bg); color: var(--text); padding: 24px; line-height: 1.5; }
  h1 { font-size: 1.75rem; font-weight: 700; margin-bottom: 4px; }
  .subtitle { color: var(--muted); font-size: 0.9rem; margin-bottom: 28px; }
  .stats-row { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 16px; margin-bottom: 28px; }
  .stat-card { background: var(--card); border: 1px solid var(--border); border-radius: 12px; padding: 20px; }
  .stat-card .label { color: var(--muted); font-size: 0.8rem; text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 4px; }
  .stat-card .value { font-size: 1.8rem; font-weight: 700; }
  .stat-card .value.accent { color: var(--accent2); }
  .stat-card .value.green { color: var(--green); }
  .stat-card .value.amber { color: var(--amber); }
  .stat-card .value.rose { color: var(--rose); }

  .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 28px; }
  @media (max-width: 900px) { .grid-2 { grid-template-columns: 1fr; } }

  .panel { background: var(--card); border: 1px solid var(--border); border-radius: 12px; padding: 24px; }
  .panel h2 { font-size: 1.1rem; font-weight: 600; margin-bottom: 16px; }

  .bar-group { margin-bottom: 14px; }
  .bar-label { font-size: 0.85rem; margin-bottom: 4px; display: flex; justify-content: space-between; }
  .bar-label span:last-child { color: var(--muted); font-size: 0.8rem; }
  .bar-track { background: var(--bg); border-radius: 6px; height: 28px; overflow: hidden; position: relative; }
  .bar-fill { height: 100%; border-radius: 6px; display: flex; align-items: center; padding-left: 10px; font-size: 0.75rem; font-weight: 600; transition: width 0.6s ease; }
  .bar-fill.c0 { background: linear-gradient(90deg, #6366f1, #818cf8); }
  .bar-fill.c1 { background: linear-gradient(90deg, #34d399, #6ee7b7); color: #064e3b; }
  .bar-fill.c2 { background: linear-gradient(90deg, #fbbf24, #fde68a); color: #78350f; }
  .bar-fill.c3 { background: linear-gradient(90deg, #fb7185, #fda4af); color: #881337; }

  .category-list { max-height: 420px; overflow-y: auto; }
  .category-list::-webkit-scrollbar { width: 6px; }
  .category-list::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
  .cat-item { display: flex; justify-content: space-between; align-items: center; padding: 8px 0; border-bottom: 1px solid var(--border); font-size: 0.85rem; }
  .cat-item:last-child { border-bottom: none; }
  .cat-badge { background: var(--bg); border: 1px solid var(--border); border-radius: 20px; padding: 2px 10px; font-size: 0.75rem; font-weight: 600; min-width: 32px; text-align: center; }

  .text-len-chart { display: flex; align-items: flex-end; gap: 2px; height: 120px; margin-top: 8px; }
  .text-bar { background: var(--accent); border-radius: 2px 2px 0 0; min-width: 3px; flex: 1; transition: background 0.2s; cursor: pointer; position: relative; }
  .text-bar:hover { background: var(--accent2); }
  .text-bar-label { font-size: 0.7rem; color: var(--muted); margin-top: 6px; text-align: center; }

  .filter-row { display: flex; gap: 12px; margin-bottom: 16px; flex-wrap: wrap; }
  .filter-row input, .filter-row select {
    background: var(--bg); border: 1px solid var(--border); border-radius: 8px; padding: 8px 14px;
    color: var(--text); font-size: 0.9rem; outline: none; transition: border-color 0.2s;
  }
  .filter-row input:focus, .filter-row select:focus { border-color: var(--accent); }
  .filter-row input { flex: 1; min-width: 200px; }
  .filter-row select { min-width: 180px; }

  table { width: 100%; border-collapse: collapse; font-size: 0.85rem; }
  thead th { text-align: left; padding: 10px 12px; border-bottom: 2px solid var(--border); color: var(--muted); font-size: 0.75rem; text-transform: uppercase; letter-spacing: 0.05em; cursor: pointer; user-select: none; white-space: nowrap; }
  thead th:hover { color: var(--text); }
  thead th .sort-arrow { margin-left: 4px; opacity: 0.4; }
  thead th.active .sort-arrow { opacity: 1; color: var(--accent2); }
  tbody tr { border-bottom: 1px solid var(--border); transition: background 0.15s; }
  tbody tr:hover { background: rgba(99, 102, 241, 0.08); }
  tbody td { padding: 10px 12px; }
  .mailbox-tag { display: inline-block; padding: 2px 8px; border-radius: 4px; font-size: 0.75rem; font-weight: 600; white-space: nowrap; }
  .mailbox-tag.m0 { background: rgba(99, 102, 241, 0.2); color: #a5b4fc; }
  .mailbox-tag.m1 { background: rgba(52, 211, 153, 0.2); color: #6ee7b7; }
  .mailbox-tag.m2 { background: rgba(251, 191, 36, 0.2); color: #fde68a; }
  .mailbox-tag.m3 { background: rgba(251, 113, 133, 0.2); color: #fda4af; }
  .name-cell { font-weight: 500; max-width: 400px; }
  .len-cell { font-variant-numeric: tabular-nums; color: var(--muted); }
  .count-label { font-size: 0.8rem; color: var(--muted); margin-top: 8px; }

  .expand-btn { background: none; border: 1px solid var(--border); border-radius: 6px; color: var(--accent2); padding: 2px 8px; font-size: 0.75rem; cursor: pointer; }
  .expand-btn:hover { background: rgba(99,102,241,0.1); }
  .preview-row td { padding: 0 12px 12px 12px; }
  .preview-content { background: var(--bg); border: 1px solid var(--border); border-radius: 8px; padding: 14px; font-size: 0.82rem; line-height: 1.6; white-space: pre-wrap; word-break: break-word; max-height: 300px; overflow-y: auto; color: var(--muted); }
</style>
</head>

const mailboxColors = {};
const mailboxNames = [...new Set(DATA.map(d => d.mailbox_name))].sort();
mailboxNames.forEach((m, i) => mailboxColors[m] = i);

function getCategory(name) {
  const first = name.split(' ')[0];
  return first;
}
DATA.forEach(d => d.category = getCategory(d.name));

// Stats
const statsRow = document.getElementById('stats-row');
const totalReplies = DATA.length;
const avgTextLen = Math.round(DATA.reduce((s,d) => s + (d.text_len||0), 0) / DATA.length);
const maxTextLen = Math.max(...DATA.map(d => d.text_len || 0));
const longestReply = DATA.find(d => d.text_len === maxTextLen);
const categories = [...new Set(DATA.map(d => d.category))];
const stats = [
  { label: 'Total Replies', value: totalReplies, cls: 'accent' },
  { label: 'Mailboxes', value: mailboxNames.length, cls: 'green' },
  { label: 'Categories', value: categories.length, cls: 'amber' },
  { label: 'Avg Text Length', value: avgTextLen + ' chars', cls: 'rose' },
];
stats.forEach(s => {
  statsRow.innerHTML += `<div class="stat-card"><div class="label">${s.label}</div><div class="value ${s.cls}">${s.value}</div></div>`;
});

// Mailbox bars
const mailboxBars = document.getElementById('mailbox-bars');
const mailboxCounts = mailboxNames.map(m => ({ name: m, count: DATA.filter(d => d.mailbox_name === m).length }));
const maxCount = Math.max(...mailboxCounts.map(m => m.count));
mailboxCounts.forEach(m => {
  const pct = (m.count / maxCount * 100).toFixed(1);
  const ci = mailboxColors[m.name];
  mailboxBars.innerHTML += `<div class="bar-group"><div class="bar-label"><span>${m.name}</span><span>${m.count} replies</span></div><div class="bar-track"><div class="bar-fill c${ci}" style="width:${pct}%">${m.count}</div></div></div>`;
});

// Category breakdown
const catSelect = document.getElementById('cat-mailbox-select');
mailboxNames.forEach(m => {
  catSelect.innerHTML += `<option value="${m}">${m}</option>`;
});
function renderCategories(mailbox) {
  const list = document.getElementById('category-list');
  const items = DATA.filter(d => d.mailbox_name === mailbox);
  const catCounts = {};
  items.forEach(d => { catCounts[d.category] = (catCounts[d.category]||0) + 1; });
  const sorted = Object.entries(catCounts).sort((a,b) => b[1] - a[1]);
  list.innerHTML = sorted.map(([cat, cnt]) =>
    `<div class="cat-item"><span>${cat}</span><span class="cat-badge">${cnt}</span></div>`
  ).join('');
}
catSelect.addEventListener('change', () => renderCategories(catSelect.value));
renderCategories(mailboxNames[0]);

// Text length histogram
const chart = document.getElementById('text-len-chart');
const bucketSize = 500;
const buckets = {};
DATA.forEach(d => {
  const b = Math.floor((d.text_len||0) / bucketSize) * bucketSize;
  buckets[b] = (buckets[b]||0) + 1;
});
const maxBucket = Math.max(...Object.keys(buckets).map(Number));
const maxBucketCount = Math.max(...Object.values(buckets));
for (let b = 0; b <= maxBucket; b += bucketSize) {
  const count = buckets[b] || 0;
  const h = count ? Math.max(4, (count / maxBucketCount) * 100) : 0;
  const bar = document.createElement('div');
  bar.className = 'text-bar';
  bar.style.height = h + '%';
  bar.title = `${b}-${b+bucketSize} chars: ${count} replies`;
  chart.appendChild(bar);
}

// Insights
const insights = document.getElementById('insights');
const nullText = DATA.filter(d => d.text_len === null || d.text_len === 0).length;
const withChatText = DATA.filter(d => d.chat_text_len > 0).length;
const fillinCount = DATA.filter(d => d.name.includes('FILLIN')).length;
const snippetCount = DATA.filter(d => d.name.includes('SNIPPET')).length;
insights.innerHTML = `
  <div style="margin-bottom:8px;"><strong style="color:var(--accent2);">Longest reply:</strong> ${longestReply.name} <span style="color:var(--muted);">(${maxTextLen.toLocaleString()} chars)</span></div>
  <div style="margin-bottom:8px;"><strong style="color:var(--green);">FILLIN templates:</strong> ${fillinCount} replies need manual fill-in</div>
  <div style="margin-bottom:8px;"><strong style="color:var(--amber);">SNIPPETs:</strong> ${snippetCount} replies are reusable snippets</div>
  <div style="margin-bottom:8px;"><strong style="color:var(--rose);">Empty/null text:</strong> ${nullText} replies have no text body</div>
  <div style="margin-bottom:8px;"><strong style="color:var(--cyan);">Chat text:</strong> ${withChatText} replies have chat-specific text</div>
  <div><strong style="color:var(--muted);">Top categories:</strong> ${(() => {
    const cc = {}; DATA.forEach(d => cc[d.category] = (cc[d.category]||0)+1);
    return Object.entries(cc).sort((a,b)=>b[1]-a[1]).slice(0,5).map(([c,n])=>`${c} (${n})`).join(', ');
  })()}</div>
`;

// Table
const filterMailbox = document.getElementById('filter-mailbox');
const filterCategory = document.getElementById('filter-category');
mailboxNames.forEach(m => { filterMailbox.innerHTML += `<option value="${m}">${m}</option>`; });
categories.sort().forEach(c => { filterCategory.innerHTML += `<option value="${c}">${c}</option>`; });

let sortCol = 'name';
let sortAsc = true;

function renderTable() {
  const search = document.getElementById('search').value.toLowerCase();
  const mbox = filterMailbox.value;
  const cat = filterCategory.value;
  let filtered = DATA.filter(d => {
    if (search && !d.name.toLowerCase().includes(search)) return false;
    if (mbox && d.mailbox_name !== mbox) return false;
    if (cat && d.category !== cat) return false;
    return true;
  });
  filtered.sort((a,b) => {
    let va = a[sortCol], vb = b[sortCol];
    if (typeof va === 'string') va = va.toLowerCase();
    if (typeof vb === 'string') vb = vb.toLowerCase();
    if (va == null) va = '';
    if (vb == null) vb = '';
    if (va < vb) return sortAsc ? -1 : 1;
    if (va > vb) return sortAsc ? 1 : -1;
    return 0;
  });
  const tbody = document.getElementById('table-body');
  tbody.innerHTML = filtered.map(d => {
    const ci = mailboxColors[d.mailbox_name];
    const shortMailbox = d.mailbox_name.replace(/^\d+\.\s*/, '');
    return `<tr data-id="${d.id}">
      <td class="len-cell">${d.id}</td>
      <td><span class="mailbox-tag m${ci}">${shortMailbox}</span></td>
      <td>${d.category}</td>
      <td class="name-cell">${d.name}</td>
      <td class="len-cell">${(d.text_len||0).toLocaleString()}</td>
    </tr>`;
  }).join('');
  document.getElementById('count-label').textContent = `Showing ${filtered.length} of ${DATA.length} replies`;

  // Update column headers
  document.querySelectorAll('thead th').forEach(th => {
    const col = th.dataset.col;
    th.classList.toggle('active', col === sortCol);
    const arrow = th.querySelector('.sort-arrow');
    if (arrow) arrow.textContent = (col === sortCol && !sortAsc) ? '\u25BC' : '\u25B2';
  });
}

document.getElementById('search').addEventListener('input', renderTable);
filterMailbox.addEventListener('change', renderTable);
filterCategory.addEventListener('change', renderTable);
document.querySelectorAll('thead th').forEach(th => {
  th.addEventListener('click', () => {
    const col = th.dataset.col;
    if (col === sortCol) { sortAsc = !sortAsc; }
    else { sortCol = col; sortAsc = true; }
    renderTable();
  });
});

renderTable();
</script>
